<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <main class="hub">

    <header class="hub__header">
      <div class="logo">
        <span class="logo__icon">🎮</span>
        <h1 class="logo__title">Party Games</h1>
      </div>
      <p class="hub__tagline">Choisissez un jeu et amusez-vous !</p>
    </header>

    <div class="games-grid">

      <!-- Undercover -->
      <button class="game-card game-card--undercover" id="btnUndercover">
        <span class="game-card__emoji">🕵️</span>
        <h2 class="game-card__name">Undercover</h2>
        <p class="game-card__desc">Trouve l'imposteur</p>
        <span class="game-card__players">3–20 joueurs</span>
      </button>

      <!-- Placeholder 2 -->
      <div class="game-card game-card--soon">
        <span class="game-card__emoji">🎯</span>
        <h2 class="game-card__name">Bientôt</h2>
        <p class="game-card__desc">En cours…</p>
      </div>

      <!-- Placeholder 3 -->
      <div class="game-card game-card--soon">
        <span class="game-card__emoji">🎲</span>
        <h2 class="game-card__name">Bientôt</h2>
        <p class="game-card__desc">En cours…</p>
      </div>

      <!-- Placeholder 4 -->
      <div class="game-card game-card--soon">
        <span class="game-card__emoji">🃏</span>
        <h2 class="game-card__name">Bientôt</h2>
        <p class="game-card__desc">En cours…</p>
      </div>

    </div>

    <footer class="hub__footer">
      <p>v1.0 · Fait avec ❤️</p>
    </footer>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
